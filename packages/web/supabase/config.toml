project_id = "thestats"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
# Access-token (JWT) lifetime in seconds. Refresh-token rotation extends
# the session beyond this on every authenticated request.
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# 30-day sliding session (FR-008 / Clarification Q3) is NOT configured here:
#   - Supabase Cloud: set "JWT expiry limit" + the refresh-token settings
#     under Authentication → Settings → Sessions in the project dashboard
#     (set Inactivity Timeout to 720h / 30 days).
#   - Self-hosted GoTrue: tune via the GOTRUE_REFRESH_TOKEN_* environment
#     variables (REFRESH_TOKEN_REUSE_INTERVAL, etc.).
#   - Local CLI dev: default refresh-token lifetimes are acceptable; the
#     30-day window is verified against a real environment, not the local
#     fixture.
